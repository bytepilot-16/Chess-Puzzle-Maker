<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Puzzle Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Chessboard.js & Chess.js -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        body { background-color: #0B192C; color: #F8FAFC; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .panel-box { background-color: #112240; border: 1px solid #1E3A5F; }
        
        /* Board specific sizing & touch behavior */
        .board-container { 
            max-width: 520px; 
            margin: 0 auto; 
            width: 100%; 
            touch-action: none; /* Prevents mobile scrolling when dragging on the board */
        }
        
        /* Board Colors */
        .white-1e1d7 { background-color: #F8FAFC; color: #0D9488; }
        .black-3c85d { background-color: #0D9488; color: #F8FAFC; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0B192C; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #0D9488; border-radius: 10px; }

        /* Spare pieces tray styling & touch behavior */
        [class^="spare-pieces-"] { 
            display: flex !important;
            flex-direction: row !important;
            justify-content: center !important;
            flex-wrap: wrap;
            background-color: #0B192C !important; 
            padding: 12px !important;
            border: 1px dashed #14B8A6;
            border-radius: 8px;
            margin: 15px 0;
            gap: 12px;
            width: 100% !important;
            touch-action: none; /* Prevents mobile scrolling when interacting with the palette */
        }
        
        /* Label the palette */
        [class^="spare-pieces-"]::before {
            content: "PIECE PALETTE (Drag to board or tap to select)";
            width: 100%;
            text-align: center;
            color: #2DD4BF;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        [class^="spare-pieces-"] img {
            width: 42px !important;
            height: 42px !important;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.1s;
        }
        [class^="spare-pieces-"] img:hover { transform: scale(1.1); }

        .move-badge { background: #1E3A5F; color: #2DD4BF; border: 1px solid #0D9488; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 13px; font-weight: bold;}
        
        /* Tab transitions */
        .tab-btn.active { border-bottom-color: #14B8A6; color: #14B8A6; }
        .tab-btn { border-bottom: 2px solid transparent; }
        
        /* Highlight for selected square / piece (Click-to-move) */
        .highlight-active {
            outline: 3px solid #14B8A6;
            outline-offset: -3px;
            background-color: rgba(20, 184, 166, 0.4) !important;
            border-radius: 4px;
        }

        /* Toast Notification */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast {
            background-color: #064E3B;
            color: #A7F3D0;
            border: 1px solid #047857;
            padding: 14px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.error-toast {
            background-color: #7F1D1D;
            color: #FECACA;
            border-color: #B91C1C;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">
    
    <div id="toast-container"></div>

    <!-- Custom Modal UI for Confirm/Prompt (Bypasses browser restrictions) -->
    <div id="customModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden flex-col items-center justify-center z-[9999] px-4">
        <div class="panel-box max-w-sm w-full p-6 rounded-2xl shadow-2xl flex flex-col gap-4 border-2 border-teal-600">
            <h3 id="modalTitle" class="text-xl font-bold text-white tracking-tight">Title</h3>
            <p id="modalMessage" class="text-sm text-slate-300 leading-relaxed">Message</p>
            <input type="text" id="modalInput" class="hidden w-full bg-[#0B192C] border border-[#1E3A5F] p-3 rounded-lg text-sm focus:outline-none focus:border-teal-400 text-teal-100 font-bold" autocomplete="off">
            <div class="flex gap-3 mt-4">
                <button id="modalCancel" class="flex-1 py-3 rounded-lg bg-[#0B192C] hover:bg-[#1E3A5F] border border-[#1E3A5F] text-slate-300 font-bold transition">Cancel</button>
                <button id="modalConfirm" class="flex-1 py-3 rounded-lg bg-teal-600 hover:bg-teal-500 text-white font-bold transition shadow-lg">Confirm</button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-7xl">
        
        <!-- Header & Navigation -->
        <header class="mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-white tracking-tight mb-6 text-center md:text-left">Puzzle <span class="text-teal-500">Studio</span></h1>
            
            <div class="flex gap-6 border-b border-[#1E3A5F] relative">
                <button id="tabStudio" class="tab-btn active pb-3 text-sm md:text-base font-bold text-slate-300 hover:text-teal-400 transition uppercase tracking-wider">
                    📝 Creator Studio
                </button>
                <button id="tabDatabase" class="tab-btn pb-3 text-sm md:text-base font-bold text-slate-400 hover:text-teal-400 transition uppercase tracking-wider flex items-center gap-2">
                    💾 Saved Database <span id="tabCount" class="bg-[#1E3A5F] text-teal-300 px-2 py-0.5 rounded-full text-xs">0</span>
                </button>
            </div>
        </header>

        <!-- PAGE 1: CREATOR STUDIO -->
        <div id="viewStudio" class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
            
            <!-- Left: Main Board Area -->
            <div class="md:col-span-7 panel-box p-6 lg:p-8 rounded-xl shadow-lg border-t-4 border-teal-600 flex flex-col w-full">
                <div class="board-container">
                    <div class="flex justify-between items-center mb-4 h-8">
                        <div id="modeIndicator" class="text-xs font-bold uppercase tracking-widest px-3 py-1 rounded bg-teal-950 text-teal-400 border border-teal-800">
                            Mode: Setup
                        </div>
                        <button id="btnFlip" class="text-xs font-bold text-slate-400 hover:text-white uppercase tracking-wider transition">Flip Board ⟲</button>
                    </div>

                    <div id="mainBoard" class="w-full rounded-lg overflow-hidden border-2 border-[#1E3A5F] cursor-pointer"></div>
                    
                    <!-- Hideable Setup Actions -->
                    <div id="boardSetupActions" class="flex justify-between mt-5">
                        <button id="btnNewPuzzle" class="text-xs font-bold text-red-400 hover:text-red-300 uppercase tracking-wider transition">Clear Board</button>
                        <button id="btnStandard" class="text-xs font-bold text-teal-400 hover:text-teal-300 uppercase tracking-wider transition">Standard Start</button>
                    </div>
                </div>
            </div>

            <!-- Right: Workflow Control Panel -->
            <div class="md:col-span-5 flex flex-col gap-6">
                
                <!-- Step 1: Position Setup (ACTIVE) -->
                <div id="setupActive" class="panel-box p-6 lg:p-8 rounded-xl space-y-6 shadow-lg border-t-4 border-teal-500">
                    <div>
                        <h2 class="text-xl font-bold text-white mb-2">1. Build Position</h2>
                        <p class="text-sm text-slate-400 leading-relaxed">Place pieces however you want. Use drag & drop or tap-to-move.</p>
                    </div>
                    
                    <div class="pt-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-3">Who moves first?</label>
                        <div class="flex gap-4">
                            <button id="turnW" class="flex-1 py-3 rounded-lg bg-teal-900 border-2 border-teal-500 text-white font-bold transition">White</button>
                            <button id="turnB" class="flex-1 py-3 rounded-lg bg-[#0B192C] border-2 border-[#1E3A5F] text-slate-400 hover:text-white transition">Black</button>
                        </div>
                    </div>

                    <button id="btnGoToRecord" class="w-full py-4 mt-4 bg-teal-600 hover:bg-teal-500 rounded-xl font-bold text-white text-lg transition shadow-lg flex items-center justify-center gap-2">
                        Confirm Setup & Record →
                    </button>
                </div>

                <!-- Step 1: Position Setup (COLLAPSED) -->
                <div id="setupCollapsed" class="panel-box p-5 rounded-xl flex justify-between items-center shadow-lg border-l-4 border-teal-500 hidden">
                    <div class="flex flex-col">
                        <span class="text-xs text-slate-500 font-bold uppercase">Setup Locked</span>
                        <span id="lockedTurnText" class="text-sm text-teal-400 font-bold">White to move</span>
                    </div>
                    <button id="btnBackToSetup" class="px-4 py-2 bg-[#0B192C] hover:bg-[#1E3A5F] border border-[#1E3A5F] rounded-lg text-xs font-bold text-slate-300 transition">
                        ✎ Edit Setup
                    </button>
                </div>

                <!-- Step 2: Record Solution -->
                <div id="recordActive" class="panel-box p-6 lg:p-8 rounded-xl space-y-6 shadow-lg border-t-4 border-orange-500 hidden">
                    <div class="flex justify-between items-start">
                        <div>
                            <h2 class="text-xl font-bold text-white mb-2">2. Record Solution</h2>
                            <p class="text-sm text-slate-400" id="recordStatusText">Play the moves on the board.</p>
                        </div>
                    </div>
                    
                    <div class="bg-[#0B192C] p-5 rounded-lg border border-[#1E3A5F] min-h-[120px]">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3">Move Sequence:</label>
                        <div id="moveHistory" class="flex flex-wrap gap-2">
                             <span class="text-sm text-slate-600 italic">Waiting for first move...</span>
                        </div>
                    </div>

                    <div class="flex gap-4 pt-4">
                        <button id="btnUndoMove" class="py-3 px-6 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm font-bold text-white transition">Undo Move</button>
                        <button id="btnSavePuzzle" class="flex-1 py-3 bg-orange-600 hover:bg-orange-500 rounded-lg font-bold text-white text-lg transition shadow-lg">
                            Save Puzzle to DB
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PAGE 2: SAVED DATABASE -->
        <div id="viewDatabase" class="hidden flex flex-col gap-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-[#112240] p-6 rounded-xl border border-[#1E3A5F] shadow-lg">
                <div>
                    <h2 class="text-2xl font-bold text-white">Puzzle Database</h2>
                    <p class="text-teal-100 opacity-70">Saved locally. Ready to be exported to PostgreSQL.</p>
                </div>
                <div class="flex flex-wrap gap-3 w-full md:w-auto">
                    <button id="clearLocalBtn" class="flex-1 md:flex-none px-4 py-3 bg-red-900/40 hover:bg-red-800 text-red-300 hover:text-white rounded-xl font-bold transition border border-red-800/50 text-sm">
                        Wipe Saved
                    </button>
                    <button id="exportAll" class="flex-1 md:flex-none px-6 py-3 bg-teal-600 hover:bg-teal-500 rounded-xl font-bold text-white transition shadow-lg flex items-center justify-center gap-2">
                        Download JSON Batch
                    </button>
                </div>
            </div>

            <div id="puzzleList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Puzzles injected here -->
            </div>
        </div>

    </div>

    <script>
        let board = null;
        let game = new Chess();
        let mode = 'setup'; 
        let currentTurn = 'w';
        let initialFen = '';
        let solutionMoves = []; 
        let database = [];
        
        // Variables for custom Click & Record logic
        let selectedSquare = null; 
        let isManualRecord = false;
        let manualFenHistory = [];

        const pieceImagesUrl = 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png';

        function init() {
            const storedPuzzles = localStorage.getItem('chess_puzzles_db');
            if (storedPuzzles) {
                database = JSON.parse(storedPuzzles);
                $('#tabCount').text(database.length);
            }

            createBoard('setup');
            updateUI();
        }

        function switchTab(tab) {
            if (tab === 'studio') {
                $('#tabStudio').addClass('active text-teal-400').removeClass('text-slate-300');
                $('#tabDatabase').removeClass('active text-teal-400').addClass('text-slate-400');
                $('#viewStudio').removeClass('hidden');
                $('#viewDatabase').addClass('hidden');
                if (board) board.resize(); 
            } else {
                $('#tabDatabase').addClass('active text-teal-400').removeClass('text-slate-400');
                $('#tabStudio').removeClass('active text-teal-400').addClass('text-slate-300');
                $('#viewDatabase').removeClass('hidden');
                $('#viewStudio').addClass('hidden');
                renderDatabase();
            }
        }

        function createBoard(newMode) {
            mode = newMode;
            if (board) board.destroy();

            const config = {
                pieceTheme: pieceImagesUrl, 
                draggable: true,
                position: (mode === 'setup' && !initialFen) ? 'start' : (initialFen || 'start'),
                sparePieces: (mode === 'setup'),
                dropOffBoard: (mode === 'setup' ? 'trash' : 'snapback'),
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd
            };

            board = Chessboard('mainBoard', config);
            
            if (mode === 'record' && !isManualRecord) {
                game.load(initialFen + " " + currentTurn + " - - 0 1");
            }
        }

        function onDragStart(source, piece, position, orientation) {
            // Prevent clearing the highlight here so that the piece palette selection survives!
            if (mode === 'record' && !isManualRecord && game.game_over()) return false;
            if (mode === 'record' && !isManualRecord) {
                if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                    (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                    return false;
                }
            }
        }

        function onDrop(source, target, piece, newPos, oldPos, orientation) {
            // Protect click-to-move selections from being erased by "phantom" drops
            if (source === target || (source === 'spare' && target === 'offboard')) {
                return 'snapback';
            }

            // Real drag drop - clear click selection
            clearHighlight();
            selectedSquare = null;

            if (mode === 'setup') return;

            if (isManualRecord) {
                setTimeout(() => {
                    manualFenHistory.push(board.fen());
                    solutionMoves.push(source + "-" + target);
                    renderMoves();
                }, 50);
                return;
            }

            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) {
                showToast("Illegal move! That is not allowed by chess rules.", true);
                return 'snapback';
            }

            solutionMoves.push(move.san);
            renderMoves();
            $('#recordStatusText').text(game.turn() === 'w' ? "Recording White's move..." : "Recording Black's move...");
        }

        function onSnapEnd() {
            if (mode === 'record' && !isManualRecord) board.position(game.fen());
        }

        function renderMoves() {
            const $box = $('#moveHistory');
            if (solutionMoves.length === 0) {
                $box.html('<span class="text-sm text-slate-600 italic">Waiting for first move...</span>');
                return;
            }
            $box.empty();
            solutionMoves.forEach((m, i) => {
                $box.append(`<span class="move-badge">${i + 1}. ${m}</span>`);
            });
        }

        function updateUI() {
            if (mode === 'setup') {
                $('#setupActive').removeClass('hidden');
                $('#setupCollapsed').addClass('hidden');
                $('#recordActive').addClass('hidden');
                
                $('#boardSetupActions').removeClass('hidden').addClass('flex');
                
                $('#modeIndicator').text('Mode: Setup').removeClass('bg-orange-950 text-orange-400 border-orange-800').addClass('bg-teal-950 text-teal-400 border-teal-800');
            } else {
                $('#setupActive').addClass('hidden');
                $('#setupCollapsed').removeClass('hidden');
                $('#recordActive').removeClass('hidden');
                
                $('#boardSetupActions').addClass('hidden').removeClass('flex');
                
                $('#modeIndicator').text('Mode: Recording').addClass('bg-orange-950 text-orange-400 border-orange-800').removeClass('bg-teal-950 text-teal-400 border-teal-800');
                
                if (isManualRecord) {
                    $('#recordStatusText').text("Free-flow tracking. Move any piece.");
                } else {
                    $('#recordStatusText').text(game.turn() === 'w' ? "Recording White's move..." : "Recording Black's move...");
                }
                $('#lockedTurnText').text(currentTurn === 'w' ? "White to move" : "Black to move");
            }

            $('#turnW').toggleClass('bg-teal-900 border-teal-500 text-white', currentTurn === 'w')
                       .toggleClass('bg-[#0B192C] border-[#1E3A5F] text-slate-400', currentTurn !== 'w');
            $('#turnB').toggleClass('bg-teal-900 border-teal-500 text-white', currentTurn === 'b')
                       .toggleClass('bg-[#0B192C] border-[#1E3A5F] text-slate-400', currentTurn !== 'b');
        }

        function renderDatabase() {
            const $list = $('#puzzleList');
            if (database.length === 0) {
                $list.html(`
                    <div class="col-span-full text-center py-20 bg-[#112240] rounded-xl border border-[#1E3A5F]">
                        <p class="text-slate-500 italic text-lg">No puzzles saved yet. Go to the Creator Studio to make some!</p>
                    </div>
                `);
                return;
            }
            $list.empty();
            
            database.forEach((p) => {
                const puzzleName = p.name || 'Puzzle';
                const item = $(`
                    <div class="bg-[#112240] p-5 rounded-xl border border-[#1E3A5F] hover:border-teal-500 transition relative group flex flex-col h-full">
                        <button onclick="window.removePuzzle(${p.id})" class="absolute top-4 right-4 text-slate-500 hover:text-red-400 transition text-xs font-bold uppercase z-10">✕ Delete</button>
                        
                        <div class="flex items-center gap-2 mb-3 pr-16">
                            <h3 class="text-sm font-bold text-teal-500 truncate">${puzzleName}</h3>
                            <button onclick="window.renamePuzzle(${p.id})" class="text-xs text-slate-500 hover:text-teal-300 opacity-0 group-hover:opacity-100 transition z-10" title="Rename Puzzle">✏️</button>
                            <button onclick="window.copyPuzzle(${p.id})" class="text-xs text-slate-500 hover:text-teal-300 opacity-0 group-hover:opacity-100 transition z-10" title="Copy Single Puzzle JSON">📋</button>
                        </div>
                        
                        <div class="mb-3">
                            <span class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Starting Setup:</span>
                            <div class="text-[11px] font-mono text-slate-300 bg-[#0B192C] p-2 rounded border border-[#1E3A5F] break-all select-all">${p.initial_fen} ${p.turn} KQkq - 0 1</div>
                        </div>

                        <div class="flex-1">
                            <span class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Solution Path:</span>
                            <div class="flex flex-wrap gap-2 mt-2">
                                ${p.solution.map((m, i) => `<span class="bg-[#1E3A5F] text-[#2DD4BF] text-xs px-2 py-1 rounded font-mono font-bold shadow-sm">${(i+1) + '. ' + m}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `);
                $list.prepend(item);
            });
        }

        // --- CUSTOM MODAL UI SYSTEM ---
        function showConfirm(title, message, confirmText, confirmClass, onConfirm) {
            $('#modalTitle').text(title);
            $('#modalMessage').text(message).show();
            $('#modalInput').addClass('hidden').val('');
            $('#modalConfirm').text(confirmText).removeClass('bg-teal-600 bg-red-600').addClass(confirmClass);
            $('#customModal').removeClass('hidden').addClass('flex');
            
            $('#modalCancel').off('click').on('click', () => $('#customModal').removeClass('flex').addClass('hidden'));
            $('#modalConfirm').off('click').on('click', () => {
                $('#customModal').removeClass('flex').addClass('hidden');
                onConfirm();
            });
        }

        function showPrompt(title, defaultValue, onConfirm) {
            $('#modalTitle').text(title);
            $('#modalMessage').hide();
            $('#modalInput').val(defaultValue).removeClass('hidden').focus();
            $('#modalConfirm').text('Save Name').removeClass('bg-red-600').addClass('bg-teal-600');
            $('#customModal').removeClass('hidden').addClass('flex');
            
            $('#modalCancel').off('click').on('click', () => $('#customModal').removeClass('flex').addClass('hidden'));
            $('#modalConfirm').off('click').on('click', () => {
                const val = $('#modalInput').val().trim();
                if(val) {
                    $('#customModal').removeClass('flex').addClass('hidden');
                    onConfirm(val);
                }
            });
        }

        // --- Global Functions for Puzzles ---
        window.renamePuzzle = (id) => {
            const puzzle = database.find(p => p.id === id);
            if (!puzzle) return;
            showPrompt("Rename Puzzle", puzzle.name || 'Puzzle', (newName) => {
                puzzle.name = newName;
                localStorage.setItem('chess_puzzles_db', JSON.stringify(database));
                renderDatabase();
                showToast("Puzzle renamed successfully!");
            });
        };

        window.removePuzzle = (id) => {
            showConfirm("Delete Puzzle", "Are you sure you want to delete this puzzle? This cannot be undone.", "Delete", "bg-red-600", () => {
                database = database.filter(p => p.id !== id);
                $('#tabCount').text(database.length);
                localStorage.setItem('chess_puzzles_db', JSON.stringify(database));
                renderDatabase();
                showToast("Puzzle deleted.");
            });
        };

        window.copyPuzzle = (id) => {
            const puzzle = database.find(p => p.id === id);
            if (!puzzle) return;
            const jsonString = JSON.stringify(puzzle, null, 2);
            
            const el = document.createElement('textarea');
            el.value = jsonString;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            showToast("Copied individual puzzle to clipboard!");
        };

        function showToast(message, isError = false) {
            const svgIcon = isError 
                ? '<svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>'
                : '<svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
            
            const toast = $(`<div class="toast ${isError ? 'error-toast' : ''}">${svgIcon}<span>${message}</span></div>`);
            $('#toast-container').append(toast);
            
            toast[0].offsetHeight; 
            toast.addClass('show');
            setTimeout(() => {
                toast.removeClass('show');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function addHighlight(square) {
            clearHighlight();
            if (square.startsWith('spare-')) {
                let piece = square.split('-')[1];
                $(`[class^="spare-pieces-"] img[data-piece="${piece}"]`).addClass('highlight-active');
            } else {
                $('.square-' + square).addClass('highlight-active');
            }
        }

        function clearHighlight() {
            $('.square-55d63').removeClass('highlight-active');
            $('[class^="spare-pieces-"] img').removeClass('highlight-active');
        }

        function handleTargetClick(square) {
            let currentPos = board.position();

            if (selectedSquare && selectedSquare.startsWith('spare-')) {
                if (mode === 'setup') {
                    const pieceToPlace = selectedSquare.split('-')[1];
                    currentPos[square] = pieceToPlace;
                    board.position(currentPos, false);
                }
                clearHighlight();
                selectedSquare = null;
            } else if (selectedSquare) {
                if (mode === 'setup') {
                    const pieceToMove = currentPos[selectedSquare];
                    delete currentPos[selectedSquare];
                    currentPos[square] = pieceToMove;
                    board.position(currentPos, false);
                    clearHighlight();
                    selectedSquare = null;
                } else if (mode === 'record') {
                    if (isManualRecord) {
                        const pieceToMove = currentPos[selectedSquare];
                        delete currentPos[selectedSquare];
                        currentPos[square] = pieceToMove;
                        board.position(currentPos, false);
                        
                        manualFenHistory.push(board.fen());
                        solutionMoves.push(selectedSquare + "-" + square);
                        renderMoves();
                        
                        clearHighlight();
                        selectedSquare = null;
                    } else {
                        let move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                        if (move) {
                            board.position(game.fen());
                            solutionMoves.push(move.san);
                            renderMoves();
                            $('#recordStatusText').text(game.turn() === 'w' ? "Recording White's move..." : "Recording Black's move...");
                            clearHighlight();
                            selectedSquare = null;
                        } else {
                            const targetPiece = game.get(square);
                            if (targetPiece && targetPiece.color === game.turn()) {
                                selectedSquare = square;
                                addHighlight(square);
                            } else {
                                showToast("Illegal move! That move is not allowed.", true);
                                clearHighlight();
                                selectedSquare = null;
                            }
                        }
                    }
                }
            }
        }

        // --- Document Ready Events ---
        $(document).ready(() => {
            init();

            // Tab Buttons
            $('#tabStudio').on('click', () => switchTab('studio'));
            $('#tabDatabase').on('click', () => switchTab('database'));

            // Turn Buttons
            $('#turnW').on('click', () => { currentTurn = 'w'; updateUI(); });
            $('#turnB').on('click', () => { currentTurn = 'b'; updateUI(); });

            // Action Buttons
            $('#btnGoToRecord').on('click', () => {
                const fen = board.fen();
                const testFen = fen + " " + currentTurn + " - - 0 1";
                
                const validator = new Chess();
                isManualRecord = !validator.load(testFen);
                
                initialFen = fen;
                manualFenHistory = [fen];
                solutionMoves = [];
                renderMoves();
                createBoard('record');
                updateUI();
            });

            $('#btnBackToSetup').on('click', () => {
                createBoard('setup');
                updateUI();
            });

            $('#btnUndoMove').on('click', () => {
                if (solutionMoves.length === 0) return;

                if (isManualRecord) {
                    solutionMoves.pop();
                    manualFenHistory.pop();
                    board.position(manualFenHistory[manualFenHistory.length - 1]);
                    renderMoves();
                } else {
                    game.undo();
                    solutionMoves.pop();
                    board.position(game.fen());
                    renderMoves();
                    $('#recordStatusText').text(game.turn() === 'w' ? "Recording White's move..." : "Recording Black's move...");
                }
            });

            $('#btnStandard').on('click', () => { board.start(); });
            $('#btnNewPuzzle').on('click', () => { board.clear(); });
            $('#btnFlip').on('click', () => board.flip());

            $('#btnSavePuzzle').on('click', () => {
                if (solutionMoves.length === 0) {
                    showToast("Please record at least one move for the solution!", true);
                    return;
                }

                const puzzle = {
                    id: Date.now(), 
                    name: 'Puzzle ' + (database.length + 1),
                    initial_fen: initialFen,
                    turn: currentTurn,
                    solution: [...solutionMoves]
                };

                database.push(puzzle);
                $('#tabCount').text(database.length); 
                localStorage.setItem('chess_puzzles_db', JSON.stringify(database));

                const btn = $(this);
                btn.text('✓ Saved!').addClass('bg-green-600').removeClass('bg-orange-600');
                setTimeout(() => {
                    btn.text('Save Puzzle to DB').removeClass('bg-green-600').addClass('bg-orange-600');
                    initialFen = '';
                    solutionMoves = [];
                    createBoard('setup');
                    updateUI();
                }, 1000);
            });

            // Wipe Saved DB Button
            $('#clearLocalBtn').on('click', () => {
                if (database.length === 0) return;
                showConfirm("Wipe Database", "🚨 Are you sure you want to WIPE all saved puzzles? This cannot be undone.", "Wipe All", "bg-red-600", () => {
                    database = [];
                    $('#tabCount').text(0);
                    localStorage.removeItem('chess_puzzles_db');
                    renderDatabase();
                    showToast("Database wiped clean.");
                });
            });

            $('#exportAll').on('click', () => {
                if (database.length === 0) return;
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(database, null, 2));
                const dl = document.createElement('a');
                dl.setAttribute("href", dataStr);
                dl.setAttribute("download", "chess_puzzles_batch.json");
                dl.click();
            });

            // Clean click-to-move capture phase listener
            document.addEventListener('pointerdown', function(e) {
                let spareContainer = e.target.closest('[class^="spare-pieces-"]');
                let spareImg = spareContainer ? e.target.closest('img') : null;
                let squareEl = e.target.closest('.square-55d63');

                if (spareImg) {
                    if (mode !== 'setup') return;
                    let piece = spareImg.getAttribute('data-piece');
                    let sq = 'spare-' + piece;

                    if (selectedSquare === sq) {
                        clearHighlight();
                        selectedSquare = null;
                    } else {
                        selectedSquare = sq;
                        addHighlight(selectedSquare);
                    }
                    return;
                }

                if (squareEl) {
                    let square = squareEl.getAttribute('data-square');
                    
                    if (selectedSquare && selectedSquare !== square) {
                        e.stopPropagation();
                        e.preventDefault(); 
                        handleTargetClick(square);
                    } else if (selectedSquare === square) {
                        clearHighlight();
                        selectedSquare = null;
                    } else {
                        let currentPos = board.position();
                        let piece = currentPos[square];
                        if (piece) {
                            if (mode === 'record' && !isManualRecord) {
                                const p = game.get(square);
                                if (p && p.color === game.turn()) {
                                    selectedSquare = square;
                                    addHighlight(selectedSquare);
                                }
                            } else {
                                selectedSquare = square;
                                addHighlight(selectedSquare);
                            }
                        }
                    }
                    return;
                }

                // If user clicks outside any interactable item, reset selection
                if (!e.target.closest('.board-container') && !e.target.closest('.panel-box') && !e.target.closest('.toast')) {
                    if (selectedSquare) {
                        clearHighlight();
                        selectedSquare = null;
                    }
                }
            }, true);
        });

        $(window).resize(() => board && board.resize());
    </script>
</body>
</html>
